# Animations — "balanced": smooth and noticeable, not sluggish.
bezier = easeOutQuint, 0.23, 1, 0.32, 1
bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
bezier = quick, 0.15, 0, 0.1, 1
bezier = overshot, 0.05, 0.9, 0.1, 1.05

animations {
    enabled = yes
    animation = global, 1, 6, default
    animation = windows, 1, 5, easeOutQuint
    animation = windowsIn, 1, 4, easeOutQuint, popin 87%
    animation = windowsOut, 1, 3, easeOutQuint, popin 87%
    animation = windowsMove, 1, 5, easeOutQuint
    animation = border, 1, 8, easeOutQuint
    animation = borderangle, 1, 30, easeOutQuint, loop
    animation = fade, 1, 3, quick
    animation = workspaces, 1, 5, easeOutQuint, slide
    animation = specialWorkspace, 1, 5, easeOutQuint, slidevert
    animation = layers, 1, 4, easeOutQuint, fade
}
