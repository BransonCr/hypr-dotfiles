# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprland — BransonCr dotfiles (rose-pine)                     ║
# ║  Self-contained. No HyDE. Productive-Arch stack on Wayland.    ║
# ╚══════════════════════════════════════════════════════════════╝

# ---- Sourced configs -------------------------------------------------
source = ./monitors.conf
source = ./nvidia.conf
source = ./userprefs.conf
source = ./keybindings.conf
source = ./windowrules.conf
source = ./animations.conf

# ---- Programs (change these to rebind your muscle memory) ------------
$mainMod  = SUPER
$term     = kitty
$editor   = kitty -e nvim
$files    = thunar
$fileTui  = kitty -e nnn
$browser  = librewolf
$menu     = rofi -show drun
$winmenu  = rofi -show window

# ---- Environment -----------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# ---- Autostart -------------------------------------------------------
exec-once = systemctl --user import-environment PATH
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = hyprsunset
exec-once = nm-applet --indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --watch cliphist store

# ---- Look & feel -----------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # rose-pine: iris -> foam active gradient, muted inactive
    col.active_border = rgba(c4a7e7ee) rgba(9ccfd8ee) 45deg
    col.inactive_border = rgba(26233aaa)
    resize_on_border = true
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 1.0
    # inactive_opacity lives in userprefs.conf (0.875) so it's yours to tune

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0f0d18cc)
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
}

# input lives in userprefs.conf (kb layout, touchpad) — yours to tune
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}
