# NVIDIA (RTX 2060 SUPER) — ported from your working config.
# See https://wiki.hypr.land/Nvidia/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm     # remove if Firefox crashes
env = NVD_BACKEND,direct         # va-api via libva-nvidia-driver (Electron fixes)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true   # avoids NVIDIA cursor hitches
}
# Requires kernel param nvidia_drm.modeset=1 (install.sh checks/advises this).
