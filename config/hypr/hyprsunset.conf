# hyprsunset — blue-light filter (redshift replacement on Wayland).
#
# ponytail: hyprsunset 0.4.0 ignores DST — it uses the zone's *standard* offset,
# so in America/Vancouver during PDT its clock runs 1h behind local time and every
# profile fires an hour late. Times below are therefore written 1h EARLY:
#   19:00 here = 20:00 PDT,  05:30 here = 06:30 PDT.
# When DST ends (Nov 1 2026) shift both forward an hour back to 20:00 / 06:30.
# Sick of that? Drop the profiles and use two systemd --user OnCalendar timers
# running `hyprctl hyprsunset ...` — OnCalendar handles DST correctly.
#
# gamma is a multiplier (0.9 = 90%), NOT a percentage — 90 is read as 9000%.
max-gamma = 150

profile {
    time = 05:30
    identity = true
}

profile {
    time = 19:00
    temperature = 4500
    gamma = 0.9
}
