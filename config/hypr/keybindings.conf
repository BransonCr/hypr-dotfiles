# Keybindings — your HyDE key-scheme, rewired to the real tools.
# Vars ($mainMod, $term, $editor, $files, $browser, $menu) come from hyprland.conf

# ---- Window management ----------------------------------------------
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, W, togglefloating,
bind = $mainMod, G, togglegroup,
bind = $mainMod, F, fullscreen, 0
bind = SHIFT, F11, fullscreen, 0
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, F, pin,
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar

# ---- Focus (arrows) --------------------------------------------------
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, alterzorder, top

# ---- Group navigation ------------------------------------------------
bind = $mainMod CONTROL, H, changegroupactive, b
bind = $mainMod CONTROL, L, changegroupactive, f

# ---- Resize (Super+Shift+arrows) ------------------------------------
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# ---- Move window (Super+Shift+Ctrl+arrows) --------------------------
bind = $mainMod SHIFT CONTROL, left, movewindow, l
bind = $mainMod SHIFT CONTROL, right, movewindow, r
bind = $mainMod SHIFT CONTROL, up, movewindow, u
bind = $mainMod SHIFT CONTROL, down, movewindow, d

# ---- Move / resize with mouse ---------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

# ---- Launchers -------------------------------------------------------
bind = $mainMod, T, exec, $term
bind = $mainMod, E, exec, $files
bind = $mainMod SHIFT, E, exec, $fileTui
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $browser
bind = $mainMod, A, exec, pkill -x rofi || $menu
bind = $mainMod, Tab, exec, pkill -x rofi || $winmenu
bind = CONTROL SHIFT, Escape, exec, $term -e btop

# ---- Clipboard (cliphist + rofi) ------------------------------------
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# ---- Session ---------------------------------------------------------
bind = $mainMod, L, exec, pidof hyprlock || hyprlock
bind = CONTROL ALT, Delete, exec, wlogout
bind = $mainMod, Delete, exit,

# ---- Screen capture (grim + slurp + swappy) -------------------------
bind = $mainMod SHIFT, P, exec, hyprpicker -a
bind = $mainMod, P, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod CONTROL, P, exec, grim -g "$(slurp -w)" - | swappy -f -
bind = , Print, exec, grim - | swappy -f -

# ---- Audio (pipewire via wpctl) -------------------------------------
bindl  = , F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , F11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , F12, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ---- Media -----------------------------------------------------------
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# ---- Brightness (harmless on desktop; works if monitor supports DDC) -
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ---- Workspaces ------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod CONTROL, right, workspace, r+1
bind = $mainMod CONTROL, left, workspace, r-1
bind = $mainMod CONTROL, down, workspace, empty

# ---- Move window to workspace ---------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod CONTROL ALT, right, movetoworkspace, r+1
bind = $mainMod CONTROL ALT, left, movetoworkspace, r-1

# ---- Move window to workspace (silent) ------------------------------
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5

# ---- Scratchpad (special workspace) ---------------------------------
bind = $mainMod, S, togglespecialworkspace,
bind = $mainMod SHIFT, S, movetoworkspace, special
bind = $mainMod ALT, S, movetoworkspacesilent, special

# ---- Scroll through workspaces --------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
