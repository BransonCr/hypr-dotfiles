# Window rules (Hyprland v0.53+ unified syntax)

# Fix stuck apps that request maximize on launch
windowrule = suppressevent maximize, class:.*

# Float common dialogs / utilities
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(nwg-look)$
windowrule = float, class:^(org.pulseaudio.pavucontrol)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(File Operation Progress)$

# Picture-in-Picture: keep on top
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = keepaspectratio, title:^(Picture-in-Picture)$

# Idle inhibit for fullscreen (video, games)
windowrule = idleinhibit fullscreen, class:.*

# Opacity: keep terminals lightly transparent, media/browser opaque
windowrule = opacity 0.94 0.90, class:^(kitty)$
windowrule = opacity 1.0 1.0, class:^(librewolf)$
windowrule = opacity 1.0 1.0, class:^(mpv)$
