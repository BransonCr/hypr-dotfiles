# Window rules — Hyprland 0.55 grammar:  windowrule = <rule> <value>, match:<key> <regex>
# (older "windowrule = float, class:^(x)$" syntax was removed; class:/title: → match:class/match:title)

# Fix stuck apps that request maximize on launch
windowrule = suppress_event maximize, match:class .*

# Float common dialogs / utilities
windowrule = float true, match:class ^(pavucontrol)$
windowrule = float true, match:class ^(blueman-manager)$
windowrule = float true, match:class ^(nm-connection-editor)$
windowrule = float true, match:class ^(nwg-look)$
windowrule = float true, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float true, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float true, match:title ^(Picture-in-Picture)$
windowrule = float true, match:title ^(Open File)$
windowrule = float true, match:title ^(File Operation Progress)$

# Picture-in-Picture: keep on top
windowrule = pin true, match:title ^(Picture-in-Picture)$
windowrule = keep_aspect_ratio true, match:title ^(Picture-in-Picture)$

# Idle inhibit for fullscreen (video, games)
windowrule = idle_inhibit fullscreen, match:class .*

# Opacity: kitty's own background_opacity (kitty.conf) is the single source
# of truth for terminal transparency — a compositor-level rule here would
# multiply against it and, worse, only reveal the "inactive" value while the
# window is unfocused (invisible while you're actually looking at it).
windowrule = opacity 1.0 1.0, match:class ^(firefox)$
windowrule = opacity 1.0 1.0, match:class ^(mpv)$
