# hyprlock — rose-pine lock screen (self-contained, no wallbash).
background {
    monitor =
    path = ~/.config/wallpapers/wall.png
    blur_passes = 3
    blur_size = 8
    color = rgba(25, 23, 36, 1.0)
}

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = false
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(224, 222, 244, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(144, 140, 170, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 110
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(196, 167, 231, 1.0)
    inner_color = rgba(38, 35, 58, 1.0)
    font_color = rgba(224, 222, 244, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##908caa">  $USER</span>
    check_color = rgba(156, 207, 216, 1.0)
    fail_color = rgba(235, 111, 146, 1.0)
    fail_text = <span foreground="##eb6f92">  $FAIL ($ATTEMPTS)</span>
    rounding = 12
    position = 0, -60
    halign = center
    valign = center
}
